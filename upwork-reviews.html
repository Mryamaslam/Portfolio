<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Upwork Client Reviews</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="styles.prettified.css?v=20260622img">
  <style>
    /* Overlay for image preview */
    .hover-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: center; justify-content: center; z-index: 9999; }
    .hover-overlay .overlay-content { position: relative; }
    .hover-overlay img { max-width: 90vw; max-height: 90vh; box-shadow: 0 10px 24px rgba(0,0,0,.4); border-radius: 8px; display: block; background: #fff; }
    .hover-overlay .overlay-back { position: absolute; top: 12px; right: 12px; }
  </style>
  
</head>
<body class="bg-light">
  <main class="container py-5">
    <h1 class="text-6 fw-600 mb-3">Upwork Client Reviews</h1>
    <p class="text-3 text-muted">A curated gallery of verified feedback and ratings from Upwork clients.</p>
    <p class="mt-4"><a class="btn btn-primary" href="index.html">Back to Portfolio</a></p>

    <section class="mt-4" aria-label="Upwork client reviews">
      <div class="row g-4">
        <div class="col-md-6 col-lg-6">
          <div class="card shadow-sm h-100">
            <img src="upwork reviews/review.png" class="card-img-top work-gallery-img reviews-img" alt="Upwork client review 1">
          </div>
        </div>
        <div class="col-md-6 col-lg-6">
          <div class="card shadow-sm h-100">
            <img src="upwork reviews/review2.png" class="card-img-top work-gallery-img reviews-img" alt="Upwork client review 2">
          </div>
        </div>
        <div class="col-md-6 col-lg-6">
          <div class="card shadow-sm h-100">
            <img src="upwork reviews/review3.png" class="card-img-top work-gallery-img reviews-img" alt="Upwork client review 3">
          </div>
        </div>
        <div class="col-md-6 col-lg-6">
          <div class="card shadow-sm h-100">
            <img src="upwork reviews/review4.png" class="card-img-top work-gallery-img reviews-img" alt="Upwork client review 4">
          </div>
        </div>
        <div class="col-md-6 col-lg-6">
          <div class="card shadow-sm h-100">
            <img src="upwork reviews/review5.png" class="card-img-top work-gallery-img reviews-img" alt="Upwork client review 5">
          </div>
        </div>
        <div class="col-md-6 col-lg-6">
          <div class="card shadow-sm h-100">
            <img src="upwork reviews/review6.png" class="card-img-top work-gallery-img reviews-img" alt="Upwork client review 6">
          </div>
        </div>
      </div>
    </section>
  </main>
  <!-- Image preview overlay -->
  <div id="hover-overlay" class="hover-overlay">
    <div class="overlay-content">
      <img alt="Preview">
      <button type="button" class="overlay-back btn btn-warning btn-sm">Back to Page</button>
    </div>
  </div>
  <script>
    (function() {
      const overlay = document.getElementById('hover-overlay');
      const overlayImg = overlay.querySelector('.overlay-content img');
      const backBtn = overlay.querySelector('.overlay-back');

      // Open overlay on any card image click
      document.querySelectorAll('.card .card-img-top').forEach(img => {
        img.addEventListener('click', () => {
          overlayImg.src = img.src;
          overlay.style.display = 'flex';
        });
      });

      // Close overlay on backdrop click
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.style.display = 'none';
          overlayImg.removeAttribute('src');
        }
      });

      // Back button closes overlay only
      backBtn.addEventListener('click', () => {
        overlay.style.display = 'none';
        overlayImg.removeAttribute('src');
      });
    })();
  </script>
</body>
</html>
