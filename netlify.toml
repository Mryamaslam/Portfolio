# Netlify configuration for Bilal Raza portfolio (static site)
# This folder IS the site root, so no build step is needed.

[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

# Long-cache static assets (images, fonts, css, js)
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
