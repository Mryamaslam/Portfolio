<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Bilal Raza portfolio" />
  <link rel="apple-touch-icon" href="logo192.png" />
  <link rel="manifest" href="manifest.json" />
  <title>BilalRaza-portfolio</title>
  <link rel="stylesheet" href="vendor/animate/animate.min.css" />
  <link rel="stylesheet" href="vendor/font-awesome/css/all.min.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900" />
  <link rel="stylesheet" href="styles.prettified.css?v=20260706mobile1" />
  <style>
    /* Fail-safe: WOW.js hides every ".wow" element with visibility:hidden and
       only reveals it on scroll by adding the "animated" class. If that
       scroll-reveal never fires (as happens with this React build), all
       sections below the hero stay invisible. Forcing visibility keeps the
       content always shown; the fade-in animations still play when WOW works. */
    .wow { visibility: visible !important; }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root">
    <div class="preloader">
      <div class="lds-ellipsis"><div></div><div></div><div></div><div></div></div>
    </div>
  </div>
  <script defer src="script.js?v=20260708copy1"></script>
  <script>
    // Contact form - works on GitHub Pages, Netlify, and local preview.
    // 1) Sends email to bilalrazaupwork@gmail.com (EmailJS, FormSubmit backup on GitHub Pages)
    // 2) Saves submission to Vercel API for admin dashboard
    (function () {
      var API_BASE = 'https://bilal-portfolio-api.vercel.app';
      var NOTIFY_EMAIL = 'bilalrazaupwork@gmail.com';
      var EMAILJS = {
        service_id:  'service_2ph8u3w',
        template_id: 'template_56jyetw',
        user_id:     'j3AoH8cf3nfZVbQVN'
      };
      var IS_NETLIFY = /\.netlify\.app$/i.test(window.location.hostname);

      function showToast(msg, isError) {
        var el = document.createElement('div');
        el.textContent = msg;
        el.setAttribute('role', 'status');
        el.style.cssText =
          'position:fixed;top:24px;right:24px;z-index:99999;' +
          'background:' + (isError ? '#dc2626' : '#16a34a') + ';color:#fff;' +
          'padding:14px 20px;border-radius:10px;font-size:14px;font-weight:600;' +
          'font-family:Poppins,system-ui,sans-serif;' +
          'box-shadow:0 8px 24px rgba(0,0,0,.25);' +
          'opacity:0;transform:translateY(-8px);transition:opacity .25s,transform .25s;';
        document.body.appendChild(el);
        requestAnimationFrame(function(){ el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
        setTimeout(function(){ el.style.opacity = '0'; el.style.transform = 'translateY(-8px)'; }, 4500);
        setTimeout(function(){ el.remove(); }, 4900);
      }

      function setSubmitting(form, busy) {
        var btn = form.querySelector('#submit-btn');
        if (!btn) return;
        btn.disabled = !!busy;
        btn.innerHTML = busy
          ? 'Sending...'
          : 'Send <span class="ms-3"><i class="fas fa-arrow-right"></i></span>';
      }

      function saveLocal(data) {
        try {
          var key = 'portfolio_submissions';
          var list = [];
          try { list = JSON.parse(localStorage.getItem(key) || '[]'); } catch (_) {}
          if (!Array.isArray(list)) list = [];
          list.push(data);
          localStorage.setItem(key, JSON.stringify(list));
        } catch (_) {}
      }

      function saveToApi(entry) {
        return fetch(API_BASE + '/api/submissions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: entry.name,
            email: entry.email,
            message: entry.message
          })
        }).then(function (r) {
          if (!r.ok) throw new Error('api');
          return r.json();
        });
      }

      function emailParams(entry) {
        return {
          to_email: NOTIFY_EMAIL,
          user_name: entry.name,
          user_email: entry.email,
          from_name: entry.name || 'Website Visitor',
          from_email: entry.email,
          reply_to: entry.email,
          message: entry.message || 'New contact form submission'
        };
      }

      function sendEmailJs(entry) {
        return fetch('https://api.emailjs.com/api/v1.0/email/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            service_id: EMAILJS.service_id,
            template_id: EMAILJS.template_id,
            user_id: EMAILJS.user_id,
            template_params: emailParams(entry)
          })
        }).then(function (r) {
          if (!r.ok) throw new Error('emailjs');
          return r.text();
        });
      }

      // Backup for GitHub Pages - no server needed (activate once via FormSubmit confirmation email)
      function sendFormSubmit(entry) {
        return fetch('https://formsubmit.co/ajax/' + encodeURIComponent(NOTIFY_EMAIL), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({
            name: entry.name,
            email: entry.email,
            message: entry.message,
            _subject: 'Portfolio contact from ' + (entry.name || 'visitor'),
            _template: 'table',
            _captcha: 'false'
          })
        }).then(function (r) {
          if (!r.ok) throw new Error('formsubmit');
          return r.json();
        });
      }

      function sendNetlifyFn(entry) {
        return fetch('/.netlify/functions/contact-notify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: entry.name,
            email: entry.email,
            message: entry.message
          })
        }).then(function (r) {
          if (!r.ok) throw new Error('netlify');
          return r.json();
        });
      }

      function sendNotification(entry) {
        if (IS_NETLIFY) {
          return sendNetlifyFn(entry).catch(function () { return sendEmailJs(entry); });
        }
        return sendEmailJs(entry).catch(function () { return sendFormSubmit(entry); });
      }

      document.addEventListener('submit', function (e) {
        var form = e.target;
        if (!form || form.id !== 'contact-form') return;

        e.preventDefault();
        e.stopImmediatePropagation();

        var entry = {
          id: Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8),
          timestamp: new Date().toISOString(),
          name:    String((form.elements['user_name']  || {}).value || '').trim(),
          email:   String((form.elements['user_email'] || {}).value || '').trim(),
          message: String((form.elements['message']    || {}).value || '').trim()
        };

        if (!entry.name || !entry.email || !entry.message) {
          showToast('Please fill in name, email, and message.', true);
          return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(entry.email)) {
          showToast('Please enter a valid email address.', true);
          return;
        }

        setSubmitting(form, true);

        var saved = false;
        var emailed = false;

        saveToApi(entry)
          .then(function () { saved = true; })
          .catch(function () { saveLocal(entry); saved = true; });

        sendNotification(entry)
          .then(function () { emailed = true; })
          .catch(function () { emailed = false; })
          .finally(function () {
            setSubmitting(form, false);
            if (emailed || saved) {
              form.reset();
              showToast(emailed
                ? 'Message sent! We will reply to your email soon.'
                : 'Message saved - email delivery had an issue. Please try again or email us directly.');
            } else {
              showToast('Could not send. Please email ' + NOTIFY_EMAIL + ' directly.', true);
            }
          });
      }, true);
    })();

    // Navigation fix: react-scroll links often have no href, so clicks do nothing.
    // This handler scrolls to the correct section, opens external links, and closes
    // the mobile menu. Runs in capture phase so it works even if react-scroll fails.
    (function () {
      var SECTIONS = {
        'home': 'home',
        'about me': 'about',
        'what i do': 'services',
        'portfolio': 'portfolio',
        'faq': 'faq',
        'client speak': 'testimonial',
        'contact me': 'contact',
        'contact': 'contact',
        'hire me': 'contact',
        'hire me!': 'contact',
        'view my works': 'portfolio',
        'add to contacts': 'bilal-raza.vcf'
      };

      function getLinkHref(el) {
        var href = el.getAttribute('href');
        if (href) return href;
        // react-scroll <a> tags have no href - el.href becomes the current page URL
        if (el.tagName === 'A' && el.href) {
          try {
            var link = new URL(el.href);
            var here = new URL(window.location.href);
            if (link.origin === here.origin && link.pathname === here.pathname && !link.hash) {
              return '';
            }
          } catch (_) {}
          return el.href;
        }
        return '';
      }

      function resolveClickTarget(target) {
        var el = target.closest('a, .scroll-down-arrow, .smooth-scroll');
        if (!el) {
          var navItem = target.closest('#header-nav li, #header-nav .nav-item');
          if (navItem) el = navItem.querySelector('a, .nav-link');
        }
        return el;
      }

      function closeMobileMenu() {
        var nav = document.getElementById('header-nav');
        var toggler = document.querySelector('#header .navbar-toggler');
        if (nav) nav.classList.remove('show');
        if (toggler) {
          toggler.classList.add('collapsed');
          toggler.classList.remove('show');
        }
      }

      function scrollToId(id) {
        var el = document.getElementById(id);
        if (!el) return false;
        closeMobileMenu();
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        return true;
      }

      function linkText(el) {
        return (el.textContent || '').replace(/\s+/g, ' ').trim().toLowerCase();
      }

      document.addEventListener('click', function (e) {
        var el = resolveClickTarget(e.target);
        if (!el || !document.getElementById('root').contains(el)) return;

        var href = getLinkHref(el);

        if (/^https?:\/\//i.test(href) && href.split('#')[0] !== window.location.href.split('#')[0]) {
          e.preventDefault();
          e.stopImmediatePropagation();
          window.open(href, '_blank', 'noopener,noreferrer');
          return;
        }

        if (/^(mailto:|tel:)/i.test(href)) return;

        if (href.charAt(0) === '#' && href.length > 1) {
          if (scrollToId(href.slice(1))) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
          return;
        }

        if (href && /\.html(?:[#?]|$)/i.test(href)) return;

        if (el.classList.contains('scroll-down-arrow')) {
          if (scrollToId('about')) {
            e.preventDefault();
            e.stopImmediatePropagation();
          }
          return;
        }

        var text = linkText(el);

        if (text.indexOf('add to contacts') !== -1) {
          e.preventDefault();
          e.stopImmediatePropagation();
          var vcfLink = document.createElement('a');
          vcfLink.href = 'bilal-raza.vcf';
          vcfLink.download = 'Bilal-Raza.vcf';
          document.body.appendChild(vcfLink);
          vcfLink.click();
          vcfLink.remove();
          return;
        }

        if (el.classList.contains('smooth-scroll')) {
          if (text.indexOf('hire') !== -1 || text.indexOf('contact') !== -1) {
            if (scrollToId('contact')) {
              e.preventDefault();
              e.stopImmediatePropagation();
            }
            return;
          }
          if (text.indexOf('portfolio') !== -1 || text.indexOf('view my works') !== -1 || text.indexOf('view project') !== -1) {
            if (scrollToId('portfolio')) {
              e.preventDefault();
              e.stopImmediatePropagation();
            }
            return;
          }
        }

        for (var key in SECTIONS) {
          if (!SECTIONS[key]) continue;
          if (text === key || text.indexOf(key) === 0) {
            var dest = SECTIONS[key];
            if (/^https?:\/\//i.test(dest)) {
              e.preventDefault();
              e.stopImmediatePropagation();
              window.open(dest, '_blank', 'noopener,noreferrer');
              return;
            }
            if (scrollToId(dest)) {
              e.preventDefault();
              e.stopImmediatePropagation();
            }
            return;
          }
        }
      }, true);
    })();
  </script>
</body>
</html>
